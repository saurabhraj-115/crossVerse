app = "crossverse-frontend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    # Must match the backend app name below
    NEXT_PUBLIC_API_URL = "https://crossverse-backend.fly.dev"

[env]
  PORT = "3000"
  NEXT_PUBLIC_API_URL = "https://crossverse-backend.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
