app = "crossverse-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Qdrant is on Fly's private network — no auth, not exposed publicly
  QDRANT_HOST = "crossverse-qdrant.internal"
  QDRANT_PORT = "6333"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
